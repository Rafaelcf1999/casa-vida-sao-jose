<ion-content class="ion-padding">
  <div class="login-container">
    <div class="form-wrapper">
      
      <h2 class="app-title">Sistema de Gerenciamento<br>Santa Hedviges</h2>

      <ion-item lines="none" class="input-item">
        <ion-input label="Usuário" labelPlacement="floating" type="text" [(ngModel)]="usuario"></ion-input>
      </ion-item>

      <ion-item lines="none" class="input-item">
        <ion-input label="Senha" labelPlacement="floating" type="password" [(ngModel)]="senha"></ion-input>
      </ion-item>

      <ion-button expand="block" class="login-button" (click)="fazerLogin()">
        ENTRAR
      </ion-button>

    </div>
  </div>
</ion-content>
