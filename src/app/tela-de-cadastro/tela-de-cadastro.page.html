<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Cadastro de Família</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Dados do Responsável -->
  <ion-list-header>
    <ion-label>Dados do Responsável</ion-label>
  </ion-list-header>
  
  <ion-item class="custom-item">
    <ion-input 
      label="Nome Completo" 
      label-placement="floating" 
      type="text" 
      [(ngModel)]="cadastro.nome">
    </ion-input>
  </ion-item>

  <ion-item class="custom-item">
    <ion-input 
      label="CPF" 
      label-placement="floating" 
      type="text" 
      placeholder="000.000.000-00" 
      maxlength="14"
      [(ngModel)]="cadastro.cpf">
    </ion-input>
  </ion-item>

  <!-- Endereço -->
  <ion-list-header>
    <ion-label>Endereço</ion-label>
  </ion-list-header>
  
  <ion-item class="custom-item cep-highlight">
    <ion-input 
      label="CEP" 
      label-placement="floating" 
      type="text" 
      placeholder="Digite para buscar"
      maxlength="9"
      (ionBlur)="buscarCEP()" 
      [(ngModel)]="cadastro.cep">
    </ion-input>
  </ion-item>

  <ion-item class="custom-item">
    <ion-input 
      label="Logradouro (Rua/Av)" 
      label-placement="floating" 
      type="text" 
      [(ngModel)]="cadastro.rua">
    </ion-input>
  </ion-item>

  <ion-item class="custom-item">
    <ion-input 
      label="Bairro" 
      label-placement="floating" 
      type="text" 
      [(ngModel)]="cadastro.bairro">
    </ion-input>
  </ion-item>

  <!-- Composição Familiar -->
  <ion-list-header>
    <ion-label>Composição Familiar</ion-label>
  </ion-list-header>
  
  <ion-item class="custom-item">
    <ion-label>Cônjuge (Marido/Esposa)</ion-label>
    <ion-toggle slot="end" [(ngModel)]="cadastro.temConjuge"></ion-toggle>
  </ion-item>

  <ion-item class="custom-item">
    <ion-input 
      label="Quantidade de Filhos" 
      label-placement="floating" 
      type="number" 
      [(ngModel)]="cadastro.qtdFilhos">
    </ion-input>
  </ion-item>

  <ion-button expand="block" color="success" class="btn-finalizar" (click)="salvar()">
    Finalizar Cadastro
  </ion-button>
</ion-content>
