<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title size="large">Famílias Cadastradas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-searchbar></ion-searchbar>

  <ion-list id="container">
    @for (familia of familia$ | async; track familia.nome){
    <ion-item id="items" button detail>
      <ion-label>
        <h2>{{familia.nome}}</h2>
        <p>{{ familia.rua}}, {{familia.numero}}</p>
      </ion-label>
    </ion-item>
    }
  </ion-list>
</ion-content>
