<ion-header [translucent]="true">
  <ion-toolbar class="home-toolbar">
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="voltar()" (keydown.enter)="voltar()">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title as="h1">Famílias Cadastradas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="home-content">
  <section class="home-hero">
    <p class="home-kicker">Painel Social</p>
    <h1>Gestão de Famílias</h1>
  </section>

  <div class="search-wrap">
    <ion-searchbar
      placeholder="Procurar famílias (nome, rua, cidade)"
      (ionInput)="filtrarFamilias($event)"
    ></ion-searchbar>
  </div>

  <ion-list class="familias-list">
    @for (familia of familiasFiltradas$ | async; track familia.nome) {
    <ion-item
      class="familia-card"
      button
      detail
      [disabled]="!familia.apta"
      (click)="redirecionar('login')"
      (keydown.enter)="redirecionar('login')"
      lines="none"
    >
      <ion-label>
        <h2>{{ familia.nome }}</h2>
        <p>{{ familia.rua }}, {{ familia.numero }}</p>
        <p>{{ familia.cidade }} - {{ familia.estado }}</p>
      </ion-label>
    </ion-item>
    } @empty {
    <ion-item lines="none" class="empty-state">
      <ion-label>Nenhuma família encontrada.</ion-label>
    </ion-item>
    }
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button
      (click)="redirecionar('login')"
      (keydown.enter)="redirecionar('login')"
    >
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
