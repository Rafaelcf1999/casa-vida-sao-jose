<app-navbar>
  <div navbarSearch class="search-wrap">
    <ion-searchbar
      placeholder="Procurar famílias"
      (ionInput)="filtrarFamilias($event)"
    ></ion-searchbar>
  </div>
</app-navbar>

<ion-content [fullscreen]="true" class="home-content">
  <ion-list class="familias-list">
    @for (familia of familiasFiltradas$ | async; track familia.id) {
    <ion-item
      class="familia-card"
      button
      detail
      [disabled]="!familia.apta"
      (click)="viewDetails(familia.id!)"
      (keydown.enter)="viewDetails(familia.id!)"
      lines="none"
    >
      <ion-label>
        <h2>{{ familia.nome }}</h2>
        <p>{{ familia.rua }}, {{ familia.numero }}</p>
        <p>{{ familia.cidade }} - {{ familia.estado }}</p>
      </ion-label>
    </ion-item>
    } @empty {
    <ion-item lines="none" class="empty-state">
      <ion-label>Nenhuma família encontrada.</ion-label>
    </ion-item>
    }
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button
      (click)="redirecionar('tela-de-cadastro')"
      (keydown.enter)="redirecionar('tela-de-cadastro')"
    >
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
